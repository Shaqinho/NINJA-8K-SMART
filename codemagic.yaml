# codemagic.yaml
# NINJA 8K - LibVLC Native Player
workflows:
  android-debug:
    name: NINJA 8K FINAL
    instance_type: mac_mini_m1
    max_build_duration: 60
    
    environment:
      vars:
        PACKAGE_NAME: "io.ninja.ninja8k"
      node: 22
      java: 21
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    
    scripts:
      - name: 1. Installation Dependances
        script: |
          npm install --legacy-peer-deps
          npm install @capacitor/cli @capacitor/android --save-dev --legacy-peer-deps
          npm install ajv@8.17.1 ajv-keywords@5.1.0 --save-exact --legacy-peer-deps
          npm install react-window @capacitor/screen-orientation @capacitor/preferences @capacitor/status-bar --legacy-peer-deps
      
      - name: 2. Build Web
        script: npm run build
      
      - name: 3. Setup Android
        script: |
          rm -rf android
          npx cap add android
          npx cap sync android
      
      - name: 4. Add LibVLC Dependency
        script: |
          # Add LibVLC dependency to app/build.gradle
          sed -i '' '/dependencies {/a\
              implementation "org.videolan.android:libvlc-all:3.5.1"
          ' android/app/build.gradle || {
            sed -i '/dependencies {/a\
              implementation "org.videolan.android:libvlc-all:3.5.1"
            ' android/app/build.gradle
          }
      
      - name: 5. Copy LibVLCPlugin
        script: |
          cat > android/app/src/main/java/io/ninja/ninja8k/LibVLCPlugin.java << 'VLCEOF'
          package io.ninja.ninja8k;

          import android.graphics.Color;
          import android.graphics.PixelFormat;
          import android.net.Uri;
          import android.os.Handler;
          import android.os.Looper;
          import android.util.Log;
          import android.view.Gravity;
          import android.view.SurfaceHolder;
          import android.view.SurfaceView;
          import android.view.View;
          import android.view.ViewGroup;
          import android.webkit.WebView;
          import android.widget.FrameLayout;

          import androidx.annotation.NonNull;
          import androidx.coordinatorlayout.widget.CoordinatorLayout;

          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;

          import org.videolan.libvlc.LibVLC;
          import org.videolan.libvlc.Media;
          import org.videolan.libvlc.MediaPlayer;
          import org.videolan.libvlc.interfaces.IVLCVout;

          import java.util.ArrayList;

          @CapacitorPlugin(name = "LibVLCPlugin")
          public class LibVLCPlugin extends Plugin {
              private static final String TAG = "LibVLCPlugin";

              private LibVLC libVLC;
              private MediaPlayer mediaPlayer;
              private SurfaceView surfaceView;
              private FrameLayout playerContainer;

              private boolean isSurfaceReady = false;
              private boolean isOverlayAttached = false;
              private String currentUrl = null;

              private int playerTop = 0;
              private int playerLeft = 0;
              private int playerWidth = 0;
              private int playerHeight = 0;
              private boolean isFullscreen = false;

              @PluginMethod
              public void initialize(PluginCall call) {
                  getActivity().runOnUiThread(() -> {
                      try {
                          cleanup();

                          ArrayList<String> options = new ArrayList<>();
                          options.add("--network-caching=1500");
                          options.add("--no-sub-autodetect-file");
                          options.add("--no-osd");
                          options.add("--no-video-title-show");

                          libVLC = new LibVLC(getContext(), options);
                          mediaPlayer = new MediaPlayer(libVLC);
                          
                          surfaceView = new SurfaceView(getContext());
                          surfaceView.setZOrderMediaOverlay(true);
                          surfaceView.getHolder().setFormat(PixelFormat.TRANSLUCENT);

                          surfaceView.getHolder().addCallback(new SurfaceHolder.Callback() {
                              @Override
                              public void surfaceCreated(@NonNull SurfaceHolder holder) {
                                  isSurfaceReady = true;
                                  attachSurfaceToVLC();
                              }
                              @Override
                              public void surfaceChanged(@NonNull SurfaceHolder holder, int format, int width, int height) {
                                  if (mediaPlayer != null) mediaPlayer.getVLCVout().setWindowSize(width, height);
                              }
                              @Override
                              public void surfaceDestroyed(@NonNull SurfaceHolder holder) {
                                  isSurfaceReady = false;
                                  detachSurfaceFromVLC();
                              }
                          });

                          playerContainer = new FrameLayout(getContext());
                          playerContainer.setBackgroundColor(Color.TRANSPARENT);
                          playerContainer.addView(surfaceView);
                          playerContainer.setVisibility(View.GONE);

                          attachBehindWebView();

                          call.resolve();
                      } catch (Exception e) {
                          call.reject(e.getMessage());
                      }
                  });
              }

              @PluginMethod
              public void setZOrder(PluginCall call) {
                  boolean onTop = call.getBoolean("onTop", false);
                  getActivity().runOnUiThread(() -> {
                      if (surfaceView != null) {
                          surfaceView.setZOrderOnTop(onTop);
                          surfaceView.setZOrderMediaOverlay(!onTop);
                      }
                      call.resolve();
                  });
              }

              private void attachBehindWebView() {
                  if (playerContainer == null || isOverlayAttached) return;
                  getActivity().runOnUiThread(() -> {
                      try {
                          WebView webView = getBridge().getWebView();
                          ViewGroup parent = (ViewGroup) webView.getParent();
                          
                          webView.setBackgroundColor(Color.TRANSPARENT);
                          
                          if (playerContainer.getParent() == null) {
                              ViewGroup.LayoutParams lp;
                              if (parent instanceof CoordinatorLayout) {
                                  lp = new CoordinatorLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT);
                              } else {
                                  lp = new FrameLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT);
                              }
                              parent.addView(playerContainer, 0, lp);
                          }
                          
                          isOverlayAttached = true;
                      } catch (Exception e) {
                          Log.e(TAG, "Attach failed", e);
                      }
                  });
              }

              @PluginMethod
              public void play(PluginCall call) {
                  String url = call.getString("url");
                  getActivity().runOnUiThread(() -> {
                      try {
                          currentUrl = url;
                          playerContainer.setVisibility(View.VISIBLE);
                          updatePlayerPosition();

                          getBridge().getWebView().setBackgroundColor(Color.TRANSPARENT);

                          if (isSurfaceReady) {
                              playUrl(url);
                          } else {
                              new Handler(Looper.getMainLooper()).postDelayed(() -> playUrl(url), 500);
                          }
                          call.resolve();
                      } catch (Exception e) {
                          call.reject(e.getMessage());
                      }
                  });
              }

              private void playUrl(String url) {
                  if (mediaPlayer == null || url == null) return;
                  mediaPlayer.stop();
                  attachSurfaceToVLC();
                  Media media = new Media(libVLC, Uri.parse(url));
                  media.setHWDecoderEnabled(true, false);
                  mediaPlayer.setMedia(media);
                  media.release();
                  mediaPlayer.play();
              }

              private void updatePlayerPosition() {
                  if (playerContainer == null) return;
                  ViewGroup.LayoutParams params = playerContainer.getLayoutParams();
                  if (params == null) return;

                  int w = isFullscreen ? ViewGroup.LayoutParams.MATCH_PARENT : (playerWidth > 0 ? playerWidth : ViewGroup.LayoutParams.MATCH_PARENT);
                  int h = isFullscreen ? ViewGroup.LayoutParams.MATCH_PARENT : (playerHeight > 0 ? playerHeight : ViewGroup.LayoutParams.MATCH_PARENT);

                  if (params instanceof CoordinatorLayout.LayoutParams) {
                      CoordinatorLayout.LayoutParams lp = (CoordinatorLayout.LayoutParams) params;
                      lp.width = w; lp.height = h;
                      lp.leftMargin = isFullscreen ? 0 : playerLeft;
                      lp.topMargin = isFullscreen ? 0 : playerTop;
                      playerContainer.setLayoutParams(lp);
                  } else if (params instanceof FrameLayout.LayoutParams) {
                      FrameLayout.LayoutParams lp = (FrameLayout.LayoutParams) params;
                      lp.width = w; lp.height = h;
                      lp.leftMargin = isFullscreen ? 0 : playerLeft;
                      lp.topMargin = isFullscreen ? 0 : playerTop;
                      lp.gravity = Gravity.TOP | Gravity.START;
                      playerContainer.setLayoutParams(lp);
                  }
              }

              private void attachSurfaceToVLC() {
                  if (mediaPlayer == null || surfaceView == null || !isSurfaceReady) return;
                  IVLCVout vout = mediaPlayer.getVLCVout();
                  if (!vout.areViewsAttached()) {
                      vout.setVideoView(surfaceView);
                      vout.attachViews();
                  }
              }

              private void detachSurfaceFromVLC() {
                  if (mediaPlayer != null) mediaPlayer.getVLCVout().detachViews();
              }

              @PluginMethod
              public void setPosition(PluginCall call) {
                  int top = call.getInt("top", 0);
                  int left = call.getInt("left", 0);
                  int width = call.getInt("width", 0);
                  int height = call.getInt("height", 0);
                  float density = getContext().getResources().getDisplayMetrics().density;
                  playerTop = Math.round(top * density);
                  playerLeft = Math.round(left * density);
                  playerWidth = Math.round(width * density);
                  playerHeight = Math.round(height * density);
                  getActivity().runOnUiThread(() -> {
                      updatePlayerPosition();
                      call.resolve();
                  });
              }

              @PluginMethod
              public void setFullscreen(PluginCall call) {
                  isFullscreen = call.getBoolean("fullscreen", false);
                  getActivity().runOnUiThread(() -> {
                      updatePlayerPosition();
                      call.resolve();
                  });
              }

              @PluginMethod
              public void setVolume(PluginCall call) {
                  int volume = call.getInt("volume", 100);
                  getActivity().runOnUiThread(() -> {
                      try {
                          if (mediaPlayer != null) {
                              int vlcVolume = Math.max(0, Math.min(200, volume));
                              mediaPlayer.setVolume(vlcVolume);
                          }
                          call.resolve();
                      } catch (Exception e) {
                          call.reject(e.getMessage());
                      }
                  });
              }

              @PluginMethod
              public void stop(PluginCall call) {
                  getActivity().runOnUiThread(() -> {
                      if (mediaPlayer != null) mediaPlayer.stop();
                      if (playerContainer != null) playerContainer.setVisibility(View.GONE);
                      call.resolve();
                  });
              }

              private void cleanup() {
                  if (mediaPlayer != null) {
                      mediaPlayer.stop();
                      mediaPlayer.release();
                      mediaPlayer = null;
                  }
                  if (libVLC != null) {
                      libVLC.release();
                      libVLC = null;
                  }
                  if (playerContainer != null && playerContainer.getParent() != null) {
                      ((ViewGroup)playerContainer.getParent()).removeView(playerContainer);
                      playerContainer = null;
                  }
                  isOverlayAttached = false;
              }

              @Override
              protected void handleOnDestroy() {
                  super.handleOnDestroy();
                  cleanup();
              }
          }
          VLCEOF
      
      - name: 6. Copy MacAddressPlugin
        script: |
          cat > android/app/src/main/java/io/ninja/ninja8k/MacAddressPlugin.java << 'MACEOF'
          package io.ninja.ninja8k;

          import android.content.Context;
          import android.net.wifi.WifiInfo;
          import android.net.wifi.WifiManager;
          import android.util.Log;

          import com.getcapacitor.JSObject;
          import com.getcapacitor.Plugin;
          import com.getcapacitor.PluginCall;
          import com.getcapacitor.PluginMethod;
          import com.getcapacitor.annotation.CapacitorPlugin;

          import java.io.BufferedReader;
          import java.io.FileReader;
          import java.io.InputStreamReader;
          import java.net.NetworkInterface;
          import java.util.Collections;
          import java.util.List;

          @CapacitorPlugin(name = "MacAddressPlugin")
          public class MacAddressPlugin extends Plugin {
              private static final String TAG = "MacAddressPlugin";
              
              @PluginMethod
              public void getMacAddress(PluginCall call) {
                  try {
                      String mac = null;
                      
                      mac = getMacFromNetworkInterface();
                      if (isValidMac(mac)) {
                          returnMac(call, mac, "network_interface");
                          return;
                      }
                      
                      mac = getMacFromFile();
                      if (isValidMac(mac)) {
                          returnMac(call, mac, "sys_file");
                          return;
                      }
                      
                      mac = getMacFromWifiManager();
                      if (isValidMac(mac)) {
                          returnMac(call, mac, "wifi_manager");
                          return;
                      }
                      
                      call.reject("Unable to retrieve MAC address");
                  } catch (Exception e) {
                      call.reject("Error: " + e.getMessage());
                  }
              }
              
              private String getMacFromNetworkInterface() {
                  try {
                      List<NetworkInterface> interfaces = Collections.list(NetworkInterface.getNetworkInterfaces());
                      for (NetworkInterface intf : interfaces) {
                          if (!intf.getName().equalsIgnoreCase("wlan0")) continue;
                          byte[] mac = intf.getHardwareAddress();
                          if (mac == null || mac.length == 0) continue;
                          StringBuilder sb = new StringBuilder();
                          for (int i = 0; i < mac.length; i++) {
                              sb.append(String.format("%02X%s", mac[i], (i < mac.length - 1) ? ":" : ""));
                          }
                          return sb.toString();
                      }
                  } catch (Exception e) { }
                  return null;
              }
              
              private String getMacFromFile() {
                  try {
                      BufferedReader reader = new BufferedReader(new FileReader("/sys/class/net/wlan0/address"));
                      String mac = reader.readLine();
                      reader.close();
                      return mac != null ? mac.trim().toUpperCase() : null;
                  } catch (Exception e) { }
                  return null;
              }
              
              @SuppressWarnings("deprecation")
              private String getMacFromWifiManager() {
                  try {
                      WifiManager wifiManager = (WifiManager) getContext().getApplicationContext().getSystemService(Context.WIFI_SERVICE);
                      if (wifiManager == null) return null;
                      WifiInfo wifiInfo = wifiManager.getConnectionInfo();
                      if (wifiInfo == null) return null;
                      String mac = wifiInfo.getMacAddress();
                      if (mac != null && !mac.equals("02:00:00:00:00:00")) {
                          return mac.toUpperCase();
                      }
                  } catch (Exception e) { }
                  return null;
              }
              
              private boolean isValidMac(String mac) {
                  if (mac == null || mac.isEmpty()) return false;
                  if (mac.equals("02:00:00:00:00:00")) return false;
                  if (mac.equals("00:00:00:00:00:00")) return false;
                  return true;
              }
              
              private void returnMac(PluginCall call, String mac, String method) {
                  JSObject result = new JSObject();
                  result.put("mac", mac);
                  result.put("method", method);
                  call.resolve(result);
              }
          }
          MACEOF

      - name: 7. Update MainActivity with LibVLC and MacAddress
        script: |
          cat > android/app/src/main/java/io/ninja/ninja8k/MainActivity.java << 'MAINEOF'
          package io.ninja.ninja8k;

          import android.graphics.Color;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.View;
          import android.view.WindowManager;
          import android.webkit.WebView;

          import androidx.core.view.WindowCompat;
          import androidx.core.view.WindowInsetsCompat;
          import androidx.core.view.WindowInsetsControllerCompat;

          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              
              private static final String TAG = "MainActivity";
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      WindowCompat.setDecorFitsSystemWindows(getWindow(), false);
                  } else {
                      getWindow().addFlags(WindowManager.LayoutParams.FLAG_LAYOUT_NO_LIMITS);
                  }
                  
                  // Register plugins
                  registerPlugin(LibVLCPlugin.class);
                  registerPlugin(MacAddressPlugin.class);
                  
                  super.onCreate(savedInstanceState);
                  
                  enableImmersiveMode();
              }
              
              @Override
              public void onStart() {
                  super.onStart();
                  
                  if (getBridge() != null && getBridge().getWebView() != null) {
                      WebView webView = getBridge().getWebView();
                      webView.setBackgroundColor(0x00000000);
                      webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                      
                      if (webView.getParent() instanceof View) {
                          ((View) webView.getParent()).setBackgroundColor(0x00000000);
                      }
                  }
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) {
                      enableImmersiveMode();
                  }
              }

              private void enableImmersiveMode() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      WindowCompat.setDecorFitsSystemWindows(getWindow(), false);
                      WindowInsetsControllerCompat controller = new WindowInsetsControllerCompat(
                          getWindow(), 
                          getWindow().getDecorView()
                      );
                      controller.hide(WindowInsetsCompat.Type.systemBars());
                      controller.setSystemBarsBehavior(
                          WindowInsetsControllerCompat.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE
                      );
                  } else {
                      View decorView = getWindow().getDecorView();
                      int uiOptions = View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                              | View.SYSTEM_UI_FLAG_FULLSCREEN
                              | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                              | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                              | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                              | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN;
                      decorView.setSystemUiVisibility(uiOptions);
                  }
                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
              }
          }
          MAINEOF
      
      - name: 8. Permissions Manifest
        script: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:amazon="http://schemas.amazon.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name=".MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true"
                      android:windowLayoutInDisplayCutoutMode="shortEdges">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF
      
      - name: 9. PATCH KOTLIN DUPLICATES
        script: |
          cat >> android/build.gradle << 'EOF'
          
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-reflect:1.8.22'
                  }
              }
          }
          EOF
      
      - name: 10. FABRICATION APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    
    publishing:
      email:
        recipients:
          - ninjadigi@proton.me
        notify:
          success: true
          failure: true
