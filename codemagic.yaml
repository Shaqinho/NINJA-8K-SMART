# codemagic.yaml
# NINJA 8K - Web HLS.js player (no native ExoPlayer)
workflows:
  android-debug:
    name: NINJA 8K FINAL
    instance_type: mac_mini_m1
    max_build_duration: 60
    
    environment:
      vars:
        PACKAGE_NAME: "io.ninja.ninja8k"
      node: 22
      java: 21
    
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    
    scripts:
      - name: 1. Installation Dependances
        script: |
          npm install --legacy-peer-deps
          npm install @capacitor/cli @capacitor/android --save-dev --legacy-peer-deps
          npm install ajv@8.17.1 ajv-keywords@5.1.0 --save-exact --legacy-peer-deps
          npm install react-window @capacitor/screen-orientation @capacitor/preferences @capacitor/status-bar --legacy-peer-deps
      
      - name: 2. Build Web
        script: npm run build
      
      - name: 3. Setup Android
        script: |
          rm -rf android
          npx cap add android
          npx cap sync android
      
      - name: 4. Update MainActivity
        script: |
          cat > android/app/src/main/java/io/ninja/ninja8k/MainActivity.java << 'MAINEOF'
          package io.ninja.ninja8k;

          import android.graphics.Color;
          import android.os.Build;
          import android.os.Bundle;
          import android.view.View;
          import android.view.WindowManager;
          import android.webkit.WebView;
          import androidx.core.view.WindowCompat;
          import androidx.core.view.WindowInsetsCompat;
          import androidx.core.view.WindowInsetsControllerCompat;

          import com.getcapacitor.BridgeActivity;

          public class MainActivity extends BridgeActivity {
              
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  
                  enableImmersiveMode();
                  makeWebViewTransparent();
              }

              @Override
              public void onWindowFocusChanged(boolean hasFocus) {
                  super.onWindowFocusChanged(hasFocus);
                  if (hasFocus) {
                      enableImmersiveMode();
                  }
              }

              private void enableImmersiveMode() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.R) {
                      WindowCompat.setDecorFitsSystemWindows(getWindow(), false);
                      WindowInsetsControllerCompat controller = new WindowInsetsControllerCompat(
                          getWindow(), 
                          getWindow().getDecorView()
                      );
                      controller.hide(WindowInsetsCompat.Type.systemBars());
                      controller.setSystemBarsBehavior(
                          WindowInsetsControllerCompat.BEHAVIOR_SHOW_TRANSIENT_BARS_BY_SWIPE
                      );
                  } else {
                      View decorView = getWindow().getDecorView();
                      int uiOptions = View.SYSTEM_UI_FLAG_IMMERSIVE_STICKY
                              | View.SYSTEM_UI_FLAG_FULLSCREEN
                              | View.SYSTEM_UI_FLAG_HIDE_NAVIGATION
                              | View.SYSTEM_UI_FLAG_LAYOUT_STABLE
                              | View.SYSTEM_UI_FLAG_LAYOUT_HIDE_NAVIGATION
                              | View.SYSTEM_UI_FLAG_LAYOUT_FULLSCREEN;
                      decorView.setSystemUiVisibility(uiOptions);
                  }

                  getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
              }
              
              private void makeWebViewTransparent() {
                  try {
                      WebView webView = getBridge().getWebView();
                      if (webView != null) {
                          webView.setBackgroundColor(Color.TRANSPARENT);
                          webView.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                      }
                  } catch (Exception e) {
                      // WebView might not be ready yet
                  }
              }
          }
          MAINEOF
      
      - name: 5. Permissions Manifest
        script: |
          cat > android/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:amazon="http://schemas.amazon.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET" />
              <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:roundIcon="@mipmap/ic_launcher_round"
                  android:supportsRtl="true"
                  android:theme="@style/AppTheme"
                  android:usesCleartextTraffic="true"
                  android:hardwareAccelerated="true">
                  <activity
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|locale|smallestScreenSize|screenLayout|uiMode"
                      android:name=".MainActivity"
                      android:label="@string/title_activity_main"
                      android:theme="@style/AppTheme.NoActionBarLaunch"
                      android:launchMode="singleTask"
                      android:exported="true"
                      android:windowLayoutInDisplayCutoutMode="shortEdges">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF
      
      - name: 6. PATCH KOTLIN DUPLICATES
        script: |
          cat >> android/build.gradle << 'EOF'
          
          allprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-reflect:1.8.22'
                  }
              }
          }
          EOF
      
      - name: 7. FABRICATION APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    
    artifacts:
      - android/app/build/outputs/apk/debug/*.apk
    
    publishing:
      email:
        recipients:
          - ninjadigi@proton.me
        notify:
          success: true
          failure: true
